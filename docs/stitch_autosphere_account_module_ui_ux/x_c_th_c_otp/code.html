</header>
<main class="flex-grow w-full max-w-[480px] px-margin_mobile pt-24 pb-12 flex flex-col">

<input class="otp-input w-full aspect-square text-center font-headline-md text-headline-md bg-surface-container-low border border-outline-variant rounded-lg transition-all focus:outline-none" inputmode="numeric" maxlength="1" type="text"/>
<input class="otp-input w-full aspect-square text-center font-headline-md text-headline-md bg-surface-container-low border border-outline-variant rounded-lg transition-all focus:outline-none" inputmode="numeric" maxlength="1" type="text"/>

<script>
        // OTP Focus Logic
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Countdown Timer Logic
        let timeLeft = 59;
        const countdownEl = document.getElementById('countdown');
        const resendBtn = document.getElementById('resend-btn');

        const timer = setInterval(() => {
            timeLeft--;
            const seconds = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
            countdownEl.textContent = `00:${seconds}`;

            if (timeLeft <= 0) {
                clearInterval(timer);
                resendBtn.disabled = false;
                resendBtn.classList.remove('opacity-40', 'cursor-not-allowed');
                resendBtn.classList.add('hover:underline', 'active:scale-95');
                countdownEl.parentElement.classList.add('hidden');
            }
        }, 1000);

        // Simulation for Action
        document.getElementById('confirm-btn').addEventListener('click', () => {
            const otpValue = Array.from(inputs).map(i => i.value).join('');
            if (otpValue.length === 6) {
                // Success feedback
                const btn = document.getElementById('confirm-btn');
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Đang xác thực...';
                btn.classList.add('opacity-80');
                
                setTimeout(() => {
                    // Logic for SCREEN 03
                    window.location.href = '#screen-03';
                    alert('Xác thực thành công! Chuyển sang Screen 03.');
                }, 1500);
            } else {
                // Error shake effect
                const container = document.getElementById('otp-container');
                container.classList.add('animate-[shake_0.5s_ease-in-out]');
                setTimeout(() => container.classList.remove('animate-[shake_0.5s_ease-in-out]'), 500);
            }
        });

        // Add custom shake animation via style inject if needed or use simple tailwind
    </script>
<style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .animate-shake {
            animation: shake 0.2s ease-in-out 0s 2;
        }
    </style>
