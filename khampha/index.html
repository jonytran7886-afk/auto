<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoSphere — Khám phá & Giao dịch xe</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #004ac6; --surface: #f8f9ff; --on-surface: #0b1c30; --muted: #434655; --border: #c3c6d7; --card: #fff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: var(--surface); color: var(--on-surface); min-height: 100vh; }
    .header { background: #fff; border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .logo { font-weight: 800; color: var(--primary); font-size: 18px; text-decoration: none; }
    .back { color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; }
    .back:hover { color: var(--primary); }
    .container { max-width: 900px; margin: 0 auto; padding: 32px 24px 48px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: var(--muted); margin-bottom: 32px; line-height: 1.5; }
    .steps { display: flex; flex-direction: column; gap: 8px; }
    .step { display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; text-decoration: none; color: inherit; transition: all 0.2s; }
    .step:hover { border-color: var(--primary); box-shadow: 0 4px 12px rgba(0,74,198,0.1); transform: translateY(-1px); }
    .step-num { width: 36px; height: 36px; border-radius: 10px; background: #eff4ff; color: var(--primary); font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .step-title { font-weight: 600; font-size: 15px; }
    .step-meta { font-size: 12px; color: var(--muted); }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: #ffdbcd; color: #943700; margin-left: 8px; }
  </style>
</head>
<body>
  <header class="header">
    <a href="../index.html" class="logo">AutoSphere</a>
    <a href="../index.html" class="back">← Về trang chủ</a>
  </header>
  <div class="container">
    <h1>Khám phá & Giao dịch xe</h1>
    <p class="subtitle">Tìm kiếm, so sánh, báo giá, lái thử và theo dõi hành trình mua xe trên AutoSphere.</p>
    <div class="steps" id="khampha-steps"></div>
  </div>
  <script src="js/flow-config.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    const el = document.getElementById('khampha-steps');
    KHAMPHA_FLOW.forEach((s) => {
      const a = document.createElement('a');
      a.className = 'step';
      let href = `pages/${s.id}.html`;
      if (s.auth && typeof AutoSphereAuth !== 'undefined' && !AutoSphereAuth.isLoggedIn()) {
        href = AutoSphereAuth.loginUrl(`khampha/pages/${s.id}.html`);
      }
      a.href = href;
      const authBadge = s.auth ? '<span class="badge">Đăng nhập</span>' : '';
      a.innerHTML = `<div class="step-num">${s.order}</div><div><div class="step-title">${s.title}${authBadge}</div><div class="step-meta">${s.phase === 'explore' ? 'Khám phá' : 'Giao dịch xe'} · Bước ${s.order}</div></div>`;
      el.appendChild(a);
    });
  </script>
</body>
</html>
