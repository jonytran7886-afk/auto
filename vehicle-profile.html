<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hồ sơ phương tiện — VEI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/header-nav.css">
  <link rel="stylesheet" href="assets/css/avatar-menu.css">
  <link rel="stylesheet" href="assets/css/vei-landing.css">
</head>
<body class="vei-landing-page" data-vei-landing="vehicle-profile">
<header class="as-vei-header fixed top-0 left-0 w-full z-[100] bg-surface/90 backdrop-blur-md border-b border-outline-variant shadow-sm">
  <div class="as-vei-header__inner">
    <a href="index.html" class="as-vei-header__logo as-brand-logo" aria-label="AutoSphere — Về trang chủ" data-brand-logo="true">
      <img class="as-brand-logo__img" src="assets/logo/autosphere-logo-header.png" alt="AutoSphere" width="1039" height="160" decoding="async">
    </a>
    <nav id="as-desktop-nav" class="as-header-nav hidden xl:flex" aria-label="VEI Navigation"></nav>
    <div class="as-vei-header__actions">
      <button id="mobile-menu-toggle" class="xl:hidden as-vei-btn-ghost" aria-label="Menu"><span class="material-symbols-outlined">menu</span></button>
      <div id="as-workspace-wrap" data-auth-only class="hidden"></div>
      <button data-auth-only class="hidden relative as-vei-btn-ghost" type="button" aria-label="Thông báo" onclick="location.href='apps/notifications.html'"><span class="material-symbols-outlined">notifications</span></button>
      <div id="auth-guest" class="flex items-center gap-2">
        <a href="account/pages/02-dang-nhap.html" class="as-vei-btn-login">Đăng nhập</a>
        <a href="account/pages/01-dang-ky.html" class="as-vei-btn-cta">Bắt đầu ngay</a>
      </div>
      <div id="auth-user" class="hidden items-center gap-2">
        <div id="avatar-menu-wrap" class="relative">
          <button id="avatar-menu-toggle" type="button" class="w-9 h-9 rounded-full overflow-hidden border-2 border-primary-fixed-dim cursor-pointer p-0 bg-transparent" aria-label="Menu tài khoản">
            <img class="w-full h-full object-cover" src="assets/images/profile-avatar.jpg" alt="Avatar" width="36" height="36">
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
<div id="as-mobile-drawer" class="as-mobile-drawer xl:hidden" aria-hidden="true">
  <div class="as-mobile-drawer-backdrop"></div>
  <div class="as-mobile-drawer-panel"><div class="flex justify-between p-4 border-b"><span class="font-bold text-primary">AutoSphere</span><button id="as-mobile-close" type="button"><span class="material-symbols-outlined">close</span></button></div><div id="as-mobile-nav" class="flex-1"></div></div>
</div>
<main class="vei-landing-main" data-vei-main style="padding-top:64px">
  <div id="vei-landing-root"></div>
</main>
<script src="assets/js/auth.js"></script>
<script src="assets/js/app-center-config.js"></script>
<script src="assets/js/header-nav-config.js"></script>
<script src="assets/js/workspace-switcher.js"></script>
<script src="assets/js/header-nav.js"></script>
<script src="assets/js/avatar-menu.js"></script>
<script src="assets/js/auth-header.js"></script>
<script src="assets/js/vei-landing-shell.js"></script>
</body>
</html>
